<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DEAR MOM</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 100%, #0a220a 0%, #000 85%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        .garden-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 10; /* Lớp hoa chính */
        }

        /* Canvas cánh hoa rơi - nằm phía sau hoa chính */
        #petals-canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 6; 
        }

        /* Thảm cỏ thấp */
        .grass {
            position: absolute;
            bottom: 0;
            background: linear-gradient(to top, #051205, #142e14);
            border-radius: 50% 50% 0 0;
            filter: blur(1px);
            opacity: 0.4;
            z-index: 5;
            transform-origin: bottom center;
            animation: sway var(--d) ease-in-out infinite alternate;
        }

        /* Bông hoa HTML/CSS */
        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            animation: flowerSway var(--d) ease-in-out infinite alternate;
        }

        .head {
            position: relative;
            width: 30px;
            height: 30px;
        }

        .petal-html {
            position: absolute;
            width: 26px;
            height: 15px;
            background: linear-gradient(to right, #ffb7c5, #ff69b4);
            border-radius: 50% 50% 10% 50%;
            top: 50%;
            left: 50%;
            transform-origin: left center;
            opacity: 0.8;
            border: 0.1px solid rgba(255, 255, 255, 0.2);
        }

        .center {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff, #ffd700);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
            box-shadow: 0 0 15px #fff176, 0 0 25px rgba(255, 241, 118, 0.4);
        }

        .stem {
            width: 2px;
            background: linear-gradient(to top, #0a1a0a, #2d5a27);
            border-radius: 1px;
        }

        /* Đom đóm */
        .firefly {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff176;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 5px #fff176;
            z-index: 15;
            animation: fireflyMove var(--t) infinite ease-in-out;
        }

        /* Trái tim bay */
        .heart {
            position: absolute;
            color: #ff69b4;
            opacity: 0;
            z-index: 2;
            animation: heartFly var(--t) linear infinite;
        }

        @keyframes flowerSway {
            from { transform: translateX(-50%) rotate(-1.5deg); }
            to { transform: translateX(-50%) rotate(1.5deg); }
        }

        @keyframes sway {
            from { transform: rotate(-3deg); }
            to { transform: rotate(3deg); }
        }

        @keyframes fireflyMove {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.7; transform: translate(25px, -35px); }
        }

        @keyframes heartFly {
            0% { transform: translateY(0) scale(0.4); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-75vh) translateX(calc(var(--rx) * 100px)) rotate(45deg); opacity: 0; }
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.85) 100%);
            pointer-events: none; z-index: 30;
        }
       
    </style>
</head>

<!-- ===== Music ===== -->
<audio id="bg-music" loop preload="auto">
    <source src="./media/Demo.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bg-music");

function playMusic() {
    music.play().catch(() => {});
    
    document.removeEventListener("click", playMusic);
    document.removeEventListener("touchstart", playMusic);
}

document.addEventListener("click", playMusic);
document.addEventListener("touchstart", playMusic);
</script>
<!-- ===== 8/3 MESSAGE + STYLE ===== -->
<style>
.message-8-3{
    position: fixed;
    top: 7%;
    width: 100%;
    text-align: center;
    z-index: 9999;
    pointer-events: none;
    animation: fadeInText 2s ease forwards;
    opacity: 0;
}

.message-8-3 h1{
    font-size: 44px;
    letter-spacing: 4px;
    font-weight: bold;
    background: linear-gradient(90deg,#ff9ecb,#ffffff,#ff4da6);
     background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 25px rgba(255,105,180,0.6);
    margin-bottom: 15px;
}

.message-8-3 p{
    font-size: 18px;
    color: #ffffff;
    max-width: 750px;
    margin: auto;
    line-height: 1.7;
    text-shadow: 0 0 15px rgba(255,255,255,0.4);
}

@keyframes fadeInText{
    to{ opacity: 1; }
}
</style>

<div class="message-8-3">
    <h1>🌸Happy Women's Day🌸</h1>
    <p>
        Chúc mẹ ngày 8/3 vui vẻ. Chúc mẹ mạnh khỏe và bớt lo nghĩ và hạnh phúc &lt;3
    </p>
</div>

<canvas id="petals-canvas"></canvas>
<div class="vignette"></div>
<div class="garden-container" id="garden"></div>

<script>
    // --- PHẦN 1: LOGIC CÁNH ĐỒNG HOA (HTML/CSS) ---
    const garden = document.getElementById('garden');

    // Tạo cỏ
    for (let i = 0; i < 250; i++) {
        const grass = document.createElement('div');
        grass.className = 'grass';
        const h = Math.random() * 25 + 10;
        grass.style.width = '2px';
        grass.style.height = h + 'px';
        grass.style.left = Math.random() * 100 + 'vw';
        grass.style.setProperty('--d', (Math.random() * 2 + 2) + 's');
        garden.appendChild(grass);
    }

    // Hàm tạo hoa
    function createFlower(left, stemHeight, delay, scale) {
        const flower = document.createElement('div');
        flower.className = 'flower';
        flower.style.left = left + 'vw';
        flower.style.bottom = '-5px';
        flower.style.transform = `scale(${scale})`;
        flower.style.setProperty('--d', (Math.random() * 2 + 3) + 's');
        flower.style.animationDelay = delay + 's';

        const head = document.createElement('div'); head.className = 'head';
        for (let i = 0; i < 6; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal-html';
            petal.style.transform = `rotate(${i * 60}deg) translateX(6px)`;
            head.appendChild(petal);
        }
        const center = document.createElement('div'); center.className = 'center';
        head.appendChild(center);

        const stem = document.createElement('div');
        stem.className = 'stem';
        stem.style.height = stemHeight + 'px';

        flower.appendChild(head); flower.appendChild(stem);
        garden.appendChild(flower);
    }

    // Rải đều 30 bông hoa
    const totalFlowers = 30;
    const step = 100 / totalFlowers;
    for (let i = 0; i < totalFlowers; i++) {
        const left = (i * step) + Math.random() * (step * 0.8);
        const height = 120 + Math.random() * 180; 
        const scale = 0.7 + Math.random() * 0.4;
        createFlower(left, height, Math.random() * -5, scale);
    }

    // Tạo đom đóm
    for (let i = 0; i < 35; i++) {
        const ff = document.createElement('div');
        ff.className = 'firefly';
        ff.style.left = Math.random() * 100 + 'vw';
        ff.style.top = Math.random() * 65 + 'vh';
        ff.style.setProperty('--t', (Math.random() * 5 + 5) + 's');
        garden.appendChild(ff);
    }

    // Trái tim bay
    setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.bottom = '12vh';
        heart.style.setProperty('--t', (Math.random() * 2 + 5) + 's');
        heart.style.setProperty('--rx', (Math.random() * 2 - 1));
        garden.appendChild(heart);
        setTimeout(() => heart.remove(), 7000);
    }, 6000); // Giảm tần suất tim cho đỡ rối mắt khi có sakura

    // --- PHẦN 2: LOGIC CANVAS CÁNH HOA ĐÀO RƠI ---
    const canvas = document.getElementById("petals-canvas");
    const ctx = canvas.getContext("2d");

    function resize(){
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    class Petal{
        constructor(){ this.reset(); }
        reset(){
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * -canvas.height;
            this.size = Math.random() * 8 + 3;
            this.speedY = Math.random() * 1.5 + 0.5;
            this.speedX = Math.random() * 1 - 0.5;
            this.angle = Math.random() * Math.PI * 2;
            this.spin = Math.random() * 0.02 - 0.01;
            this.opacity = Math.random() * 0.5 + 0.2;
        }
        update(){
            this.y += this.speedY;
            this.x += Math.sin(this.y * 0.01) + this.speedX;
            this.angle += this.spin;
            if(this.y > canvas.height){ this.reset(); this.y = -10; }
        }
        draw(){
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(this.size, -this.size, this.size, this.size, 0, this.size * 2);
            ctx.bezierCurveTo(-this.size, this.size, -this.size, -this.size, 0, 0);
            ctx.fillStyle = `rgba(255,183,197,${this.opacity})`;
            ctx.fill();
            ctx.restore();
        }
    }

    const petalsArray = [];
    for(let i=0; i<100; i++){ // 100 cánh hoa đào là đủ đẹp
        petalsArray.push(new Petal());
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        petalsArray.forEach(p=>{
            p.update();
            p.draw();
        });
        requestAnimationFrame(animate);
    }
    animate();
   
</script>
</script>
</body>
</html>
